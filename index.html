<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rangmanch — Clickable Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16233E;
  --ink-2:#212F4C;
  --saffron:#F0A93B;
  --saffron-dark:#CB8A22;
  --vermilion:#B84B26;
  --cream:#FAF6EF;
  --paper:#FFFFFF;
  --sage:#2F7A5C;
  --sage-light:#E7F2EB;
  --slate:#5B6472;
  --line:#E7E0D3;
  --line-2:#EFEAE0;
  --danger:#B84B26;
  --radius:14px;
  --radius-sm:9px;
  --shadow:0 1px 2px rgba(22,35,62,.05), 0 8px 24px -12px rgba(22,35,62,.18);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',-apple-system,sans-serif;
  background:#E9E2D2;
  color:var(--ink);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.mono{font-family:'IBM Plex Mono',monospace;}
.display{font-family:'Fraunces',serif;}
button{font-family:inherit; cursor:pointer;}
a{color:inherit;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:#D9CFB8; border-radius:8px;}

/* ---------- device toggle bar ---------- */
.demo-bar{
  width:100%;
  max-width:1180px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px;
  gap:12px;
  flex-wrap:wrap;
}
.demo-bar .brand-mark{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:15px;
  color:var(--ink);
  letter-spacing:.2px;
}
.demo-bar .brand-mark span{color:var(--vermilion);}
.demo-bar .brand-tag{font-size:12px; color:var(--slate);}

/* ---------- device wrap ---------- */
.device-wrap{
  width:100%;
  max-width:1180px;
  padding:0 18px 40px;
  display:flex;
  justify-content:center;
}

.app-shell{
  width:100%;
  background:var(--cream);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  min-height:760px;
  border:1px solid var(--line);
}

/* ---------- sidebar ---------- */
.sidebar{
  width:230px;
  flex-shrink:0;
  background:var(--ink);
  color:#EDEAE2;
  display:flex;
  flex-direction:column;
  padding:20px 14px;
}
.sidebar .logo{
  font-family:'Fraunces',serif;
  font-size:20px;
  font-weight:600;
  padding:4px 10px 20px;
  color:#fff;
}
.sidebar .logo span{color:var(--saffron);}
.role-switch{
  display:flex;
  background:rgba(255,255,255,.08);
  border-radius:10px;
  padding:3px;
  margin:0 4px 18px;
}
.role-switch button{
  flex:1;
  border:none;
  background:transparent;
  color:#B9C1D6;
  font-size:11.5px;
  font-weight:600;
  padding:7px 4px;
  border-radius:8px;
}
.role-switch button.active{background:var(--saffron); color:var(--ink);}
.persona-card{
  display:flex;
  align-items:center;
  gap:10px;
  padding:9px 10px;
  margin:0 4px 18px;
  background:rgba(255,255,255,.06);
  border-radius:10px;
}
.avatar{
  width:34px;height:34px;border-radius:50%;
  background:var(--saffron);
  color:var(--ink);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;flex-shrink:0;
}
.persona-card .p-name{font-size:12.5px;font-weight:600;color:#fff;}
.persona-card .p-sub{font-size:10.5px;color:#9AA4BE;}
.persona-swap{
  margin:0 4px 20px;
  font-size:10.5px;
  color:var(--saffron);
  background:none;border:none;padding:0 10px;
  text-align:left;font-weight:600;
}
.nav-list{list-style:none;margin:0;padding:0;flex:1;}
.nav-list li{margin-bottom:2px;}
.nav-list button{
  width:100%;
  display:flex;
  align-items:center;
  gap:11px;
  border:none;
  background:transparent;
  color:#C4CADD;
  padding:10px 12px;
  border-radius:9px;
  font-size:13px;
  font-weight:500;
  text-align:left;
}
.nav-list button svg{flex-shrink:0; opacity:.85;}
.nav-list button.active{background:rgba(240,169,59,.14); color:#fff;}
.nav-list button.active svg{opacity:1; stroke:var(--saffron);}
.nav-list button:hover:not(.active){background:rgba(255,255,255,.05);}
.sidebar-foot{
  font-size:10.5px;
  color:#7B8399;
  padding:10px 12px;
  border-top:1px solid rgba(255,255,255,.08);
  margin-top:8px;
  line-height:1.5;
}

/* ---------- main column ---------- */
.main-col{flex:1; display:flex; flex-direction:column; min-width:0;}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 24px;
  border-bottom:1px solid var(--line);
  background:var(--paper);
  gap:14px;
}
.topbar .hamburger{display:none; border:none;background:none;}
.topbar .title-block .eyebrow{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--vermilion); font-weight:700;}
.topbar .title-block h1{font-family:'Fraunces',serif; font-size:20px; margin:2px 0 0; font-weight:600; color:var(--ink);}
.topbar-right{display:flex; align-items:center; gap:12px;}
.icon-btn{
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--line); background:var(--paper);
  display:flex;align-items:center;justify-content:center;
  color:var(--slate);
}
.main-area{
  flex:1;
  overflow-y:auto;
  padding:22px 24px 90px;
}
.bottom-nav{display:none;}

/* ---------- generic bits ---------- */
.grid{display:grid; gap:14px;}
.grid-stats{grid-template-columns:repeat(4,1fr);}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:repeat(3,1fr);}
.card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px;
}
.stat-card .stat-label{font-size:11px; color:var(--slate); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
.stat-card .stat-value{font-family:'IBM Plex Mono',monospace; font-size:23px; font-weight:600; margin-top:6px; color:var(--ink);}
.stat-card .stat-delta{font-size:11.5px; margin-top:5px; color:var(--sage); font-weight:600;}
.section-head{display:flex; align-items:center; justify-content:space-between; margin:26px 0 12px;}
.section-head:first-child{margin-top:0;}
.section-head h2{font-family:'Fraunces',serif; font-size:17px; font-weight:600; margin:0;}
.section-head .link-btn{font-size:12.5px; font-weight:600; color:var(--vermilion); background:none; border:none;}

.btn{
  border:none; border-radius:9px; padding:9px 16px; font-weight:600; font-size:13px;
  display:inline-flex; align-items:center; gap:7px;
}
.btn-primary{background:var(--ink); color:#fff;}
.btn-primary:hover{background:var(--ink-2);}
.btn-accent{background:var(--saffron); color:var(--ink);}
.btn-accent:hover{background:var(--saffron-dark);}
.btn-ghost{background:transparent; color:var(--ink); border:1px solid var(--line);}
.btn-ghost:hover{background:var(--line-2);}
.btn-sm{padding:6px 11px; font-size:12px;}
.btn-block{width:100%; justify-content:center;}
.btn[disabled]{opacity:.45; pointer-events:none;}

.chip{
  display:inline-flex; align-items:center; gap:5px;
  font-size:11px; font-weight:600; padding:4px 9px; border-radius:999px;
  background:var(--line-2); color:var(--ink);
}
.chip-dot{width:6px;height:6px;border-radius:50%;}
.badge-verified{
  display:inline-flex; align-items:center; gap:4px;
  font-size:10.5px; font-weight:700; color:var(--sage);
  background:var(--sage-light); padding:3px 8px; border-radius:999px;
}
.status-pill{font-size:10.5px; font-weight:700; padding:4px 10px; border-radius:999px;}
.status-negotiating{background:#FCEFDD; color:var(--saffron-dark);}
.status-escrow{background:#E6EEFB; color:#2C5CB0;}
.status-delivered{background:#F1E7FB; color:#6A3FB8;}
.status-paid{background:var(--sage-light); color:var(--sage);}

/* ledger strip - signature element */
.ledger{
  display:flex; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;
  background:var(--paper);
}
.ledger .seg{flex:1; padding:14px 16px; border-right:1px dashed var(--line);}
.ledger .seg:last-child{border-right:none; background:var(--sage-light);}
.ledger .seg .k{font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--slate); font-weight:700;}
.ledger .seg .v{font-family:'IBM Plex Mono',monospace; font-size:19px; font-weight:600; margin-top:4px;}
.ledger .seg:last-child .v{color:var(--sage);}
.ledger .seg.fee .v{color:var(--vermilion);}

.seal{
  width:52px;height:52px;border-radius:50%;
  border:2px solid var(--sage);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  color:var(--sage); flex-shrink:0;
}
.seal .n{font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:15px; line-height:1;}
.seal .l{font-size:7px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; margin-top:1px;}

.creator-card{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:15px; display:flex; flex-direction:column; gap:10px;}
.creator-card .cc-head{display:flex; align-items:center; gap:10px;}
.creator-card .cc-name{font-weight:700; font-size:14px;}
.creator-card .cc-sub{font-size:11.5px; color:var(--slate);}
.creator-card .cc-stats{display:flex; gap:14px; font-size:11.5px; color:var(--slate);}
.creator-card .cc-stats b{color:var(--ink); font-family:'IBM Plex Mono',monospace;}

.brief-card{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:16px;}
.brief-card .bc-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
.brief-card h3{font-size:14.5px; margin:0 0 4px; font-family:'Fraunces',serif; font-weight:600;}
.brief-card .bc-meta{font-size:11.5px; color:var(--slate); margin-bottom:10px;}
.brief-card .bc-tags{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;}

table.data-table{width:100%; border-collapse:collapse; font-size:12.5px;}
table.data-table th{
  text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em;
  color:var(--slate); padding:8px 10px; border-bottom:1px solid var(--line); font-weight:700;
}
table.data-table td{padding:10px; border-bottom:1px solid var(--line-2); vertical-align:middle;}
table.data-table tr:hover td{background:#FBF8F1;}

.form-row{margin-bottom:14px;}
.form-row label{display:block; font-size:12px; font-weight:700; margin-bottom:6px; color:var(--ink);}
.form-row .hint{font-size:11px; color:var(--slate); margin-top:5px;}
input[type=text], input[type=number], select, textarea{
  width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:9px;
  font-family:'Inter',sans-serif; font-size:13px; background:var(--paper); color:var(--ink);
}
textarea{resize:vertical; min-height:70px;}
.pill-select{display:flex; gap:8px; flex-wrap:wrap;}
.pill-select button{
  border:1px solid var(--line); background:var(--paper); border-radius:999px;
  padding:7px 14px; font-size:12.5px; font-weight:600; color:var(--slate);
}
.pill-select button.sel{background:var(--ink); color:#fff; border-color:var(--ink);}

.timeline{display:flex; margin:18px 0;}
.timeline .tl-step{flex:1; text-align:center; position:relative;}
.timeline .tl-step::before{
  content:""; position:absolute; top:12px; left:-50%; width:100%; height:2px; background:var(--line); z-index:0;
}
.timeline .tl-step:first-child::before{display:none;}
.timeline .tl-step.done::before{background:var(--sage);}
.timeline .dot{
  width:26px;height:26px; border-radius:50%; background:var(--paper); border:2px solid var(--line);
  display:flex; align-items:center; justify-content:center; margin:0 auto 6px; position:relative; z-index:1;
  font-size:12px; color:var(--slate); font-weight:700;
}
.timeline .tl-step.done .dot{background:var(--sage); border-color:var(--sage); color:#fff;}
.timeline .tl-step.current .dot{background:var(--saffron); border-color:var(--saffron); color:var(--ink);}
.timeline .tl-label{font-size:10.5px; font-weight:600; color:var(--slate);}
.timeline .tl-step.done .tl-label, .timeline .tl-step.current .tl-label{color:var(--ink);}

.chat-thread{border:1px solid var(--line); border-radius:var(--radius); background:var(--paper); display:flex; flex-direction:column; height:300px;}
.chat-msgs{flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px;}
.msg{max-width:75%; padding:9px 12px; border-radius:12px; font-size:12.5px; line-height:1.45;}
.msg.them{background:var(--line-2); align-self:flex-start; border-bottom-left-radius:3px;}
.msg.me{background:var(--ink); color:#fff; align-self:flex-end; border-bottom-right-radius:3px;}
.msg .t{font-size:9.5px; opacity:.6; margin-top:4px;}
.chat-input{display:flex; gap:8px; padding:10px; border-top:1px solid var(--line);}
.chat-input input{flex:1;}

.empty-state{text-align:center; padding:50px 20px; color:var(--slate);}
.empty-state svg{margin-bottom:12px; opacity:.5;}
.empty-state h3{font-family:'Fraunces',serif; color:var(--ink); font-size:16px; margin:0 0 6px;}
.empty-state p{font-size:12.5px; max-width:320px; margin:0 auto;}

.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px;
  font-size:12.5px; font-weight:600; display:flex; align-items:center; gap:8px;
  box-shadow:0 10px 30px -8px rgba(0,0,0,.4); z-index:999; opacity:0; pointer-events:none;
  transition:opacity .25s, transform .25s;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

.progress-dots{display:flex; gap:6px; justify-content:center; margin:18px 0 6px;}
.progress-dots span{width:7px; height:7px; border-radius:50%; background:var(--line);}
.progress-dots span.on{background:var(--saffron); width:20px; border-radius:4px;}

.onboard-wrap{max-width:420px; margin:10px auto; text-align:center;}
.onboard-wrap .step-icon{
  width:64px;height:64px; border-radius:50%; background:var(--sage-light); color:var(--sage);
  display:flex; align-items:center; justify-content:center; margin:0 auto 16px;
}
.onboard-wrap h2{font-family:'Fraunces',serif; font-size:21px; margin:0 0 8px;}
.onboard-wrap p.sub{font-size:13px; color:var(--slate); margin:0 0 20px; line-height:1.5;}
.lang-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:8px;}
.lang-grid button{
  border:1.5px solid var(--line); background:var(--paper); border-radius:12px; padding:16px 10px;
  font-weight:700; font-size:14px; text-align:left;
}
.lang-grid button .native{display:block; font-family:'Fraunces',serif; font-size:19px; margin-bottom:2px;}
.lang-grid button.sel{border-color:var(--saffron); background:#FEF7EA;}
.connect-row{display:flex; align-items:center; justify-content:space-between; border:1px solid var(--line); border-radius:12px; padding:13px 14px; margin-bottom:10px; background:var(--paper); text-align:left;}
.connect-row .cr-left{display:flex; align-items:center; gap:10px;}
.connect-row .platform-ic{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;}

.score-ring-wrap{position:relative; width:74px; height:74px; flex-shrink:0;}
.score-ring-wrap .ring-num{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column;}
.score-ring-wrap .ring-num b{font-family:'IBM Plex Mono',monospace; font-size:18px;}
.score-ring-wrap .ring-num small{font-size:8px; color:var(--slate); font-weight:700;}

.filter-bar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
.kanban{display:flex; gap:14px; overflow-x:auto; padding-bottom:10px;}
.kanban-col{min-width:220px; flex:1;}
.kanban-col h4{font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--slate); margin:0 0 10px; display:flex; justify-content:space-between;}
.kanban-card{background:var(--paper); border:1px solid var(--line); border-radius:11px; padding:11px; margin-bottom:9px; font-size:12px;}
.kanban-card .kc-name{font-weight:700; margin-bottom:3px;}
.kanban-card .kc-meta{color:var(--slate); font-size:11px; margin-bottom:8px;}

.bar-chart{display:flex; align-items:flex-end; gap:14px; height:150px; padding-top:10px;}
.bar-chart .bar-col{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;}
.bar-chart .bar{width:100%; max-width:34px; border-radius:6px 6px 2px 2px; background:var(--saffron);}
.bar-chart .bar-val{font-size:10px; font-family:'IBM Plex Mono',monospace; margin-bottom:4px; color:var(--ink); font-weight:600;}
.bar-chart .bar-label{font-size:10px; color:var(--slate); margin-top:6px; text-align:center;}

.modal-overlay{position:fixed; inset:0; background:rgba(22,23,35,.45); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px;}
.modal{background:var(--paper); border-radius:16px; max-width:460px; width:100%; padding:22px; max-height:85vh; overflow-y:auto;}
.modal h3{font-family:'Fraunces',serif; margin:0 0 4px; font-size:18px;}
.modal .modal-close{float:right; border:none; background:var(--line-2); border-radius:50%; width:28px; height:28px;}

/* ---------- responsive: this is a real fluid layout, not a device mock ---------- */
/* Tablet: tighten stat grids before the full mobile switch */
@media (max-width:1100px){
  .grid-stats{grid-template-columns:1fr 1fr;}
}
/* Mobile browser widths: sidebar becomes a drawer, nav moves to a bottom bar */
@media (max-width:900px){
  .demo-bar{padding:12px 14px;}
  .device-wrap{padding:0 0 20px;}
  .app-shell{min-height:100vh; border-radius:0; border:none;}
  .sidebar{display:none;}
  .bottom-nav{
    display:flex; position:sticky; bottom:0; background:var(--paper); border-top:1px solid var(--line);
    padding:6px 4px 8px;
  }
  .topbar .hamburger{display:flex; align-items:center; justify-content:center;}
  .grid-2, .grid-3{grid-template-columns:1fr;}
  .main-col{width:100%;}
  .main-area{padding:16px 14px 90px;}
  .ledger{flex-direction:column;}
  .ledger .seg{border-right:none; border-bottom:1px dashed var(--line);}
}
@media (max-width:520px){
  .grid-stats{grid-template-columns:1fr 1fr;}
}

.bottom-nav button{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none;
  color:var(--slate); font-size:9.5px; font-weight:600; padding:6px 2px;
}
.bottom-nav button.active{color:var(--ink);}
.bottom-nav button.active svg{stroke:var(--saffron);}

/* drawer for mobile persona/role switch */
.drawer-overlay{position:fixed; inset:0; background:rgba(22,23,35,.4); z-index:150; display:none;}
.drawer-overlay.show{display:block;}
.drawer{position:absolute; left:0; top:0; bottom:0; width:250px; background:var(--ink); padding:20px 14px; overflow-y:auto;}

@media (min-width:901px){
  .drawer-overlay{display:none !important;}
}
</style>
</head>
<body>

<div class="demo-bar">
  <div class="brand-mark">Rangmanch<span>.</span></div>
  <div class="brand-tag">Clickable prototype · resize the window to see the responsive mobile layout</div>
</div>

<div class="device-wrap" id="deviceWrap">
  <div class="app-shell" id="appShell"><!-- injected --></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ======================= ICONS ======================= */
function icon(name, size){
  size = size || 18;
  const s = `width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"`;
  const map = {
    dashboard:`<svg ${s}><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>`,
    briefcase:`<svg ${s}><rect x="2.5" y="7" width="19" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M2.5 12h19"/></svg>`,

/* ======================= HELPERS ======================= */
function fmtINR(n){ return '₹' + n.toLocaleString('en-IN'); }
function scoreColor(v){ return v>=85 ? 'var(--sage)' : v>=70 ? 'var(--saffron-dark)' : 'var(--vermilion)'; }

function scoreRing(value, label){
  const r = 30, c = 2*Math.PI*r;
  const off = c - (value/100)*c;
  const col = scoreColor(value);
  return `<div class="score-ring-wrap">
    <svg width="74" height="74" viewBox="0 0 74 74">
      <circle cx="37" cy="37" r="${r}" fill="none" stroke="var(--line)" stroke-width="6"/>
      <circle cx="37" cy="37" r="${r}" fill="none" stroke="${col}" stroke-width="6" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 37 37)"/>
    </svg>
    <div class="ring-num"><b>${value}</b><small>${label}</small></div>
  </div>`;
}

function ledger(brandPays, feePct){
  const fee = Math.round(brandPays * feePct/100);
  const receive = brandPays - fee;
  const oldAgency = Math.round(brandPays * 0.375); // ~37.5% avg of old 35-40%
  return `<div class="ledger">
    <div class="seg"><div class="k">Brand pays</div><div class="v">${fmtINR(brandPays)}</div></div>
    <div class="seg fee"><div class="k">Platform fee (${feePct}%)</div><div class="v">−${fmtINR(fee)}</div></div>
    <div class="seg"><div class="k">You receive</div><div class="v">${fmtINR(receive)}</div></div>
  </div>
  <div class="hint" style="margin-top:8px; text-align:center;">Under the old exclusive-agency model, this same deal would typically pay a creator only <b>${fmtINR(oldAgency)}</b> (35–40%).</div>`;
}

function statusPill(status){
  const map = {negotiating:['status-negotiating','Negotiating'], escrow:['status-escrow','Escrow funded'], delivered:['status-delivered','Delivered'], paid:['status-paid','Paid']};
  const [cls,label] = map[status];
  return `<span class="status-pill ${cls}">${label}</span>`;
}

function timelineFor(status){
  const steps = [
    {id:'negotiating', label:'Negotiating'},
    {id:'escrow', label:'Escrow Funded'},
    {id:'delivered', label:'Delivered'},
    {id:'paid', label:'Paid'}
  ];
  const order = ['negotiating','escrow','delivered','paid'];
  const idx = order.indexOf(status);
  return `<div class="timeline">${steps.map((s,i)=>{
    let cls = i<idx ? 'done' : i===idx ? 'current' : '';
    return `<div class="tl-step ${cls}"><div class="dot">${i<idx?icon('check',12):i+1}</div><div class="tl-label">${s.label}</div></div>`;
  }).join('')}</div>`;
}

function toast(msg){
  const t = document.getElementById('toast');
  t.innerHTML = icon('check',14) + ' ' + msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

const RATE_TABLE = {
  'YouTube-Beauty':[6000,9500],'YouTube-Food':[4000,7000],'YouTube-Tech':[8000,13000],'YouTube-Fashion':[5000,8500],
  'Instagram-Beauty':[7000,12000],'Instagram-Food':[4500,7500],'Instagram-Tech':[6500,10500],'Instagram-Fashion':[6000,10000],
};
function pricingTool(){
  const platform = window._pt_platform || 'YouTube';
  const niche = window._pt_niche || 'Beauty';
  const tier = window._pt_tier || '10K–50K';
  const key = platform+'-'+niche;

}

function dealRowHTML(d, perspective){
  const other = perspective==='creator' ? d.brand : d.creator;
  const fee = Math.round(d.brandPays*d.feePct/100);
  const amt = perspective==='creator' ? d.brandPays-fee : d.brandPays;
  return `<div class="card" style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; cursor:pointer;" onclick="openDeal(${d.id})">
    <div style="display:flex; align-items:center; gap:12px; min-width:0;">
      <div class="avatar" style="background:var(--ink); color:#fff;">${other.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
      <div style="min-width:0;">
        <div style="font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${other}</div>
        <div class="hint" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${d.brief}</div>
      </div>
    </div>
    <div style="text-align:right; flex-shrink:0;">
      <div class="mono" style="font-weight:700; font-size:13px;">${fmtINR(amt)}</div>
      <div style="margin-top:4px;">${statusPill(d.status)}</div>
    </div>
  </div>`;
}

function openDeal(id){ state.activeDeal = id; renderShell(); }
function backToDeals(){ state.activeDeal = null; renderShell(); }

function dealDetail(d, perspective){
  const other = perspective==='creator' ? d.brand : d.creator;
  const nextAction = dealNextAction(d, perspective);
  return `
    <button class="btn btn-ghost btn-sm" onclick="backToDeals()" style="margin-bottom:14px;">&larr; Back to deals</button>
    <div class="section-head" style="margin-top:0;">
      <h2>${d.brief}</h2>${statusPill(d.status)}
    </div>
    <div class="hint" style="margin-bottom:10px;">${perspective==='creator'?'Brand':'Creator'}: <b style="color:var(--ink);">${other}</b></div>
    ${timelineFor(d.status)}
    ${ledger(d.brandPays, d.feePct)}
    <div style="margin-top:14px;">${nextAction}</div>

    <div class="section-head"><h2>Messages</h2></div>
    <div class="chat-thread">
      <div class="chat-msgs" id="chatMsgs">
        ${d.thread.map(m=>`<div class="msg ${m.from==='me'?'me':'them'}">${m.text}<div class="t">${m.t}</div></div>`).join('')}
      </div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Write a message…" onkeydown="if(event.key==='Enter')sendMsg(${d.id})">
        <button class="btn btn-primary btn-sm" onclick="sendMsg(${d.id})">${icon('send',14)}</button>
      </div>
    </div>
  `;
}

function dealNextAction(d, perspective){
  if(d.status==='negotiating'){
    if(perspective==='creator') return `<button class="btn btn-accent btn-block" onclick="advanceDeal(${d.id})">Accept terms &amp; request escrow</button>`;
    return `<button class="btn btn-accent btn-block" onclick="advanceDeal(${d.id})">Fund escrow for ${fmtINR(d.brandPays)}</button>`;
  }
  if(d.status==='escrow'){
    if(perspective==='creator') return `<button class="btn btn-accent btn-block" onclick="advanceDeal(${d.id})">Mark deliverable as submitted</button>`;
    return `<div class="hint">Waiting for the creator to submit the deliverable. Funds are safely held in escrow.</div>`;
  }
  if(d.status==='delivered'){
    if(perspective==='creator') return `<div class="hint">Delivered — waiting for brand approval to release payment.</div>`;
    return `<button class="btn btn-accent btn-block" onclick="advanceDeal(${d.id})">Approve &amp; release payment</button>`;
  }
  return `<div class="hint">${icon('check',12)} Payment complete. Receipt available in your deal history.</div>`;
}

function advanceDeal(id){
  const d = DEALS.find(x=>x.id===id);
  const order = ['negotiating','escrow','delivered','paid'];
  const idx = order.indexOf(d.status);
  if(idx<order.length-1){ d.status = order[idx+1]; toast('Deal moved to "'+order[idx+1]+'"'); }
  renderShell();
}
function sendMsg(id){
  const input = document.getElementById('chatInput');
  if(!input || !input.value.trim()) return;
  const d = DEALS.find(x=>x.id===id);
  d.thread.push({from:'me', text:input.value.trim(), t:'Just now'});
  renderShell();
  setTimeout(()=>{ const el=document.getElementById('chatMsgs'); if(el) el.scrollTop = el.scrollHeight; }, 30);
}

      <div class="card stat-card"><div class="stat-label">Avg. engagement</div><div class="stat-value">10.6%</div></div>
      <div class="card stat-card"><div class="stat-label">ROI multiplier</div><div class="stat-value">3.4×</div></div>
      <div class="card stat-card"><div class="stat-label">Creators paid</div><div class="stat-value">${role==='agency'?'46':'14'}</div></div>
    </div>
    <div class="section-head"><h2>Spend by region (₹000s)</h2></div>
    <div class="card">
      <div class="bar-chart">
        ${regionData.map(d=>`<div class="bar-col"><div class="bar-val">${d.v}</div><div class="bar" style="height:${(d.v/max*100)}px;"></div><div class="bar-label">${d.l}</div></div>`).join('')}
      </div>
    </div>
    <div class="section-head"><h2>Top creators by ROI</h2></div>
    <div class="card" style="padding:0; overflow-x:auto;">
      <table class="data-table">
        <thead><tr><th>Creator</th><th>Region</th><th>Spend</th><th>Engagement</th><th>ROI</th></tr></thead>
        <tbody>
          ${CREATORS.slice(0,5).map((c,i)=>`<tr><td style="font-weight:700;">${c.name}</td><td>${c.location}</td><td class="mono">${c.rate.split(' ')[0]}</td><td>${c.engagement}</td><td class="mono" style="color:var(--sage); font-weight:700;">${(2.1+i*0.4).toFixed(1)}×</td></tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

/* ======================= ONBOARDING ======================= */
const LANGS = [
  {id:'hi', label:'हिंदी', sub:'Hindi'}, {id:'ta', label:'தமிழ்', sub:'Tamil'},
  {id:'te', label:'తెలుగు', sub:'Telugu'}, {id:'en', label:'English', sub:'English'}
];
function renderOnboarding(){
  const step = state.onboardStep;
  const steps = [onboardLang, onboardConnect, onboardPricing, onboardProfile];
  return `<div class="app-shell" style="width:100%; display:flex; align-items:stretch; justify-content:center; padding:30px 18px; background:var(--cream);">
    <div style="width:100%; max-width:420px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
        <div class="brand-mark" style="font-family:'Fraunces',serif; font-weight:600;">Rangmanch<span style="color:var(--vermilion)">.</span></div>
        ${step>0?`<button class="btn btn-ghost btn-sm" onclick="skipOnboard()">Skip</button>`:''}
      </div>
      ${steps[step]()}
      <div class="progress-dots">${[0,1,2,3].map(i=>`<span class="${i===step?'on':''}"></span>`).join('')}</div>
    </div>
  </div>`;
}
function skipOnboard(){ finishOnboarding(); }
function onboardLang(){
  return `<div class="onboard-wrap">
    <div class="step-icon">${icon('user',26)}</div>
    <h2>Choose your language</h2>
    <p class="sub">Rangmanch works fully in your language — profile, contracts and deal terms included.</p>
    <div class="lang-grid">
      ${LANGS.map(l=>`<button class="${state.onboardLang===l.id?'sel':''}" onclick="state.onboardLang='${l.id}'; renderShell();"><span class="native">${l.label}</span>${l.sub}</button>`).join('')}
    </div>
    <button class="btn btn-accent btn-block" style="margin-top:14px;" ${!state.onboardLang?'disabled':''} onclick="state.onboardStep=1; renderShell();">Continue ${icon('arrowr',13)}</button>
  </div>`;
}
function onboardConnect(){
  const c = state.onboardConnected;
  return `<div class="onboard-wrap">
    <div class="step-icon">${icon('shield',26)}</div>
    <h2>Verify your account</h2>
    <p class="sub">Connect one platform so brands can see your real, verified stats — this is what powers your trust score.</p>
    <div class="connect-row" onclick="c_toggle('yt')">
      <div class="cr-left"><div class="platform-ic" style="background:#B84B26;">YT</div><div style="text-align:left;"><div style="font-weight:700; font-size:13px;">YouTube</div><div class="hint">18.2K subscribers found</div></div></div>
      ${c.yt?icon('check',18):'<span class="btn btn-ghost btn-sm">Connect</span>'}
    </div>
    <div class="connect-row" onclick="c_toggle('ig')">
      <div class="cr-left"><div class="platform-ic" style="background:#8A4FCB;">IG</div><div style="text-align:left;"><div style="font-weight:700; font-size:13px;">Instagram</div><div class="hint">Not connected yet</div></div></div>
      ${c.ig?icon('check',18):'<span class="btn btn-ghost btn-sm">Connect</span>'}
    </div>
    <div style="display:flex; gap:10px; margin-top:8px;">
      <button class="btn btn-ghost btn-block" onclick="state.onboardStep=0; renderShell();">Back</button>
      <button class="btn btn-accent btn-block" ${!(c.yt||c.ig)?'disabled':''} onclick="state.onboardStep=2; renderShell();">Continue ${icon('arrowr',13)}</button>
    </div>
  </div>`;
}
function c_toggle(k){ state.onboardConnected[k] = !state.onboardConnected[k]; renderShell(); }
function onboardPricing(){
  return `<div class="onboard-wrap">
    <div class="step-icon">${icon('tag',26)}</div>
    <h2>Here's what creators like you earn</h2>
    <p class="sub">Based on your niche, platform and audience size — refreshed from live deals, not a guess.</p>
    <div class="card" style="text-align:center; padding:26px 16px;">
      <div class="stat-label">Food &amp; Lifestyle · YouTube · 10K–50K</div>
      <div class="stat-value" style="font-size:30px; margin-top:8px;">₹4,000 – ₹6,500</div>
      <div class="hint" style="margin-top:8px;">per video, and you keep 94% of it</div>
    </div>
    <div style="display:flex; gap:10px; margin-top:14px;">
      <button class="btn btn-ghost btn-block" onclick="state.onboardStep=1; renderShell();">Back</button>
      <button class="btn btn-accent btn-block" onclick="state.onboardStep=3; renderShell();">Continue ${icon('arrowr',13)}</button>
    </div>
  </div>`;
}
function onboardProfile(){
  return `<div class="onboard-wrap">
    <div class="step-icon">${icon('check',26)}</div>
    <h2>You're almost live</h2>
    <p class="sub">Add a short bio so brands know what you're about. You can always edit this later.</p>
    <div class="form-row" style="text-align:left;"><label>Short bio</label><textarea placeholder="e.g. Food &amp; travel creator from Varanasi, sharing street food tours and dhaba reviews in Hindi.">Food &amp; travel creator from Varanasi, sharing street food tours and dhaba reviews in Hindi.</textarea></div>
    <div style="display:flex; gap:10px; margin-top:4px;">
      <button class="btn btn-ghost btn-block" onclick="state.onboardStep=2; renderShell();">Back</button>
      <button class="btn btn-accent btn-block" onclick="finishOnboarding()">Go to my dashboard</button>
    </div>
  </div>`;
}
function finishOnboarding(){
  state.role='creator'; state.persona='rajan'; state.view='dashboard';
  renderShell();
  toast('Welcome to Rangmanch, Rajan!');
}

/* ======================= INIT ======================= */
function boot(){
  renderShell();
}
document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
